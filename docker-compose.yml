      - .env

  whatsapp-service:
    build:
      context: ./services/whatsapp-service
      dockerfile: Dockerfile
    ports:
      - "3014:3014"
    depends_on:
      - postgres
      - redis
    env_file:
      - .env

  billing-service:
    build:
      context: ./services/billing-service
      dockerfile: Dockerfile
    ports:
      - "3015:3015"
    depends_on:
      - postgres
    env_file:
      - .env

  campaigns-service:
    build:
      context: ./services/campaigns-service
      dockerfile: Dockerfile
    ports:
      - "3016:3016"
    depends_on:
      - postgres
    env_file:
      - .env

  voicemail-service:
    build:
      context: ./services/voicemail-service
      dockerfile: Dockerfile
    ports:
      - "3017:3017"
    depends_on:
      - postgres
    env_file:
      - .env

  queue-service:
    build:
      context: ./services/queue-service
      dockerfile: Dockerfile
    ports:
      - "3018:3018"
