  survey-service:
    build:
      context: ./services/survey-service
      dockerfile: Dockerfile
    ports:
      - "3020:3020"
    depends_on:
      - postgres
    env_file:
      - .env

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3021:3000"
    depends_on:
      - api-gateway
    env_file:
      - .env

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  rabbitmq_data:
  elasticsearch_data:
